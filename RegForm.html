<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
}

.container{
    width:350px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}

input{
    width:100%;
    padding:8px;
    margin:6px 0;
}

button{
    padding:10px;
    width:100%;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

.error{
    color:red;
    font-size:12px;
}

.success{
    color:green;
}

#strength{
    height:8px;
    margin-top:4px;
    background:#ddd;
}

#strength div{
    height:100%;
    width:0%;
}
</style>
</head>

<body>

<div class="container">

<h2>Registration</h2>

<form id="form">

<label>Name</label>
<input type="text" id="name">
<div class="error" id="nameError"></div>

<label>Email</label>
<input type="text" id="email">
<div class="error" id="emailError"></div>

<label>Phone</label>
<input type="text" id="phone">
<div class="error" id="phoneError"></div>

<label>Password</label>
<input type="password" id="password">
<button type="button" id="toggle">Show Password</button>

<div id="strength">
<div id="bar"></div>
</div>

<br>

<button type="submit">Register</button>

</form>

<p id="msg"></p>

</div>

<script>

const form = document.getElementById("form")

const nameInput = document.getElementById("name")
const emailInput = document.getElementById("email")
const phoneInput = document.getElementById("phone")
const passwordInput = document.getElementById("password")

const bar = document.getElementById("bar")
const toggle = document.getElementById("toggle")



nameInput.addEventListener("input",()=>{
    if(nameInput.value.length < 3){
        nameError.textContent="Name must be 3+ characters"
    }else{
        nameError.textContent=""
    }
})



emailInput.addEventListener("input",()=>{
    let pattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/
    if(!pattern.test(emailInput.value)){
        emailError.textContent="Invalid email"
    }else{
        emailError.textContent=""
    }
})



phoneInput.addEventListener("input",()=>{
    let pattern=/^[0-9]{10}$/
    if(!pattern.test(phoneInput.value)){
        phoneError.textContent="Phone must be 10 digits"
    }else{
        phoneError.textContent=""
    }
})



passwordInput.addEventListener("input",()=>{

    let pass=passwordInput.value
    let strength=0

    if(pass.length>5) strength++
    if(/[A-Z]/.test(pass)) strength++
    if(/[0-9]/.test(pass)) strength++
    if(/[^A-Za-z0-9]/.test(pass)) strength++

    let width=strength*25
    bar.style.width=width+"%"

    if(width<=25) bar.style.background="red"
    else if(width<=50) bar.style.background="orange"
    else if(width<=75) bar.style.background="yellow"
    else bar.style.background="green"

})



toggle.addEventListener("click",()=>{
    if(passwordInput.type==="password"){
        passwordInput.type="text"
        toggle.textContent="Hide Password"
    }else{
        passwordInput.type="password"
        toggle.textContent="Show Password"
    }
})



form.addEventListener("submit",(e)=>{
e.preventDefault()

let submission={
    name:nameInput.value,
    email:emailInput.value,
    phone:phoneInput.value,
    password:passwordInput.value
}

let submissions=JSON.parse(localStorage.getItem("submissions")) || []

submissions.push(submission)

localStorage.setItem("submissions",JSON.stringify(submissions))

msg.textContent="Registration Saved!"

form.reset()
bar.style.width="0%"

})

</script>

</body>
</html>
